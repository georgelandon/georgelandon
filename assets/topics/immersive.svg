<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Immersive media and VR">
  <defs>
    <radialGradient id="bg" cx="22%" cy="18%" r="95%">
      <stop offset="0" stop-color="#1b2a5a" stop-opacity="0.86"/>
      <stop offset="0.6" stop-color="#0b1026" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#060914"/>
    </radialGradient>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#96cdff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#ba84ff" stop-opacity="0.60"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="260" cy="150" r="230" fill="url(#g)" filter="url(#soft)" opacity="0.26"/>
  <circle cx="980" cy="260" r="260" fill="url(#g)" filter="url(#soft)" opacity="0.18"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.65">
    <circle cx="90" cy="110" r="2"/><circle cx="190" cy="260" r="1.4"/><circle cx="310" cy="90" r="1.2"/>
    <circle cx="470" cy="180" r="1.8"/><circle cx="610" cy="120" r="1.3"/><circle cx="770" cy="240" r="1.5"/>
    <circle cx="930" cy="130" r="1.2"/><circle cx="1120" cy="90" r="1.7"/><circle cx="1040" cy="520" r="1.2"/>
    <circle cx="830" cy="570" r="1.6"/><circle cx="610" cy="610" r="1.3"/><circle cx="360" cy="540" r="1.1"/>
  </g>

  <!-- VR headset -->
  <g transform="translate(300 255)">
    <rect x="150" y="80" width="600" height="260" rx="90" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)" stroke-width="4"/>
    <rect x="230" y="140" width="200" height="140" rx="45" fill="rgba(150,205,255,0.14)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="470" y="140" width="200" height="140" rx="45" fill="rgba(186,132,255,0.12)" stroke="rgba(255,255,255,0.18)"/>
    <path d="M150 210c-70 0-120 20-150 60" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="10" stroke-linecap="round"/>
    <path d="M750 210c70 0 120 20 150 60" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="450" cy="210" r="16" fill="rgba(255,255,255,0.20)"/>
  </g>

  <!-- audio waves -->
  <g fill="none" stroke="rgba(150,205,255,0.22)" stroke-width="6" opacity="0.8">
    <path d="M170 520c80-60 150-60 230 0"/>
    <path d="M210 560c60-45 110-45 170 0"/>
    <path d="M800 520c80-60 150-60 230 0"/>
    <path d="M840 560c60-45 110-45 170 0"/>
  </g>
</svg>
