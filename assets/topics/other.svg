<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Other work">
  <defs>
    <radialGradient id="bg" cx="24%" cy="20%" r="95%">
      <stop offset="0" stop-color="#1b2a5a" stop-opacity="0.84"/>
      <stop offset="0.62" stop-color="#0b1026" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#060914"/>
    </radialGradient>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#96cdff" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#ba84ff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="260" cy="160" r="240" fill="url(#g)" filter="url(#soft)" opacity="0.20"/>
  <circle cx="980" cy="260" r="280" fill="url(#g)" filter="url(#soft)" opacity="0.14"/>

  <!-- constellation -->
  <g fill="#ffffff" opacity="0.75">
    <circle cx="350" cy="210" r="3"/>
    <circle cx="460" cy="300" r="2.6"/>
    <circle cx="560" cy="240" r="2.2"/>
    <circle cx="690" cy="330" r="2.8"/>
    <circle cx="820" cy="260" r="2.3"/>
  </g>
  <g stroke="rgba(150,205,255,0.25)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M350 210L460 300L560 240L690 330L820 260"/>
  </g>

  <!-- background stars -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="90" cy="110" r="2"/><circle cx="190" cy="260" r="1.4"/><circle cx="310" cy="90" r="1.2"/>
    <circle cx="470" cy="180" r="1.8"/><circle cx="610" cy="120" r="1.3"/><circle cx="770" cy="240" r="1.5"/>
    <circle cx="930" cy="130" r="1.2"/><circle cx="1120" cy="90" r="1.7"/><circle cx="1040" cy="520" r="1.2"/>
    <circle cx="830" cy="570" r="1.6"/><circle cx="610" cy="610" r="1.3"/><circle cx="360" cy="540" r="1.1"/>
  </g>
</svg>
