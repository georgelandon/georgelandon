<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Cultural heritage digitization">
  <defs>
    <radialGradient id="bg" cx="20%" cy="18%" r="95%">
      <stop offset="0" stop-color="#1b2a5a" stop-opacity="0.82"/>
      <stop offset="0.62" stop-color="#0b1026" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#060914"/>
    </radialGradient>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#96cdff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ba84ff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="260" cy="160" r="230" fill="url(#g)" filter="url(#soft)" opacity="0.22"/>
  <circle cx="980" cy="260" r="260" fill="url(#g)" filter="url(#soft)" opacity="0.16"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.60">
    <circle cx="80" cy="120" r="2"/><circle cx="210" cy="90" r="1.3"/><circle cx="340" cy="150" r="1.4"/>
    <circle cx="520" cy="95" r="1.2"/><circle cx="760" cy="160" r="1.6"/><circle cx="980" cy="110" r="1.3"/>
    <circle cx="1120" cy="90" r="1.7"/><circle cx="1040" cy="520" r="1.2"/><circle cx="860" cy="590" r="1.5"/>
    <circle cx="620" cy="610" r="1.2"/><circle cx="430" cy="560" r="1.1"/><circle cx="170" cy="540" r="1.4"/>
  </g>

  <!-- stylized petroglyph / rock art motif -->
  <g transform="translate(350 160)" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 40c-80 0-140 60-140 135 0 75 60 135 140 135 80 0 140-60 140-135 0-75-60-135-140-135z"/>
    <path d="M250 90v170"/>
    <path d="M160 175h180"/>
    <path d="M200 330c20 30 60 55 100 55s80-25 100-55"/>
    <path d="M60 430c40-55 80-85 120-85 35 0 70 20 105 60" opacity="0.75"/>
    <path d="M440 405c25-40 55-60 90-60 40 0 80 30 120 85" opacity="0.75"/>
  </g>

  <!-- scanning lines -->
  <g stroke="rgba(150,205,255,0.18)" stroke-width="6">
    <path d="M160 560H1040"/>
    <path d="M220 600H980"/>
  </g>
</svg>
