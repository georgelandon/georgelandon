<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Computational imaging and document restoration">
  <defs>
    <radialGradient id="bg" cx="28%" cy="18%" r="95%">
      <stop offset="0" stop-color="#1b2a5a" stop-opacity="0.86"/>
      <stop offset="0.62" stop-color="#0b1026" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#060914"/>
    </radialGradient>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#96cdff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ba84ff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="220" cy="160" r="210" fill="url(#g)" filter="url(#soft)" opacity="0.25"/>
  <circle cx="980" cy="250" r="250" fill="url(#g)" filter="url(#soft)" opacity="0.18"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.65">
    <circle cx="90" cy="120" r="2"/><circle cx="220" cy="90" r="1.3"/><circle cx="360" cy="150" r="1.5"/>
    <circle cx="520" cy="95" r="1.2"/><circle cx="760" cy="160" r="1.6"/><circle cx="980" cy="110" r="1.3"/>
    <circle cx="1120" cy="90" r="1.7"/><circle cx="1020" cy="520" r="1.2"/><circle cx="840" cy="590" r="1.5"/>
    <circle cx="610" cy="610" r="1.2"/><circle cx="420" cy="560" r="1.1"/><circle cx="180" cy="540" r="1.4"/>
  </g>

  <!-- document -->
  <g transform="translate(360 150)">
    <rect x="0" y="0" width="480" height="520" rx="28" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="36" y="46" width="408" height="64" rx="16" fill="rgba(150,205,255,0.12)"/>
    <g stroke="rgba(255,255,255,0.18)" stroke-width="4" opacity="0.9">
      <path d="M56 160H424"/>
      <path d="M56 210H404"/>
      <path d="M56 260H430"/>
      <path d="M56 310H392"/>
      <path d="M56 360H420"/>
      <path d="M56 410H398"/>
    </g>

    <!-- illumination sweep -->
    <path d="M-80 520 L220 -40 L310 0 L10 560 Z" fill="rgba(186,132,255,0.12)"/>
  </g>
</svg>
