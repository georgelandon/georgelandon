for the per-topic SVGs in this folder.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="bg" cx="20%" cy="15%" r="90%">
      <stop offset="0" stop-color="#1b2a5a" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#0b1026" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#060914"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" x2="1">
      <stop offset="0" stop-color="#96cdff" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#ba84ff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="220" cy="140" r="170" fill="url(#glow)" filter="url(#soft)" opacity="0.45"/>
  <circle cx="980" cy="220" r="190" fill="url(#glow)" filter="url(#soft)" opacity="0.30"/>
</svg>
